name: Enforce dev -> main only

on:
  pull_request:
    branches:
      - main

jobs:
  check-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure PR is from dev
        run: |
          if [ "${{ github.head_ref }}" != "dev" ]; then
            echo "Only pull requests from 'dev' to 'main' are allowed."
            exit 1
          fi